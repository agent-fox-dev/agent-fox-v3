# Agent-Fox self-development environment
#
# The executor (agent-fox v2.2.1) is baked into the image.
# The workspace (this repo) is bind-mounted at /workspace.
# API keys and git/ssh config are passed through from the host.
#
# Usage:
#   cd scripts/self-dev
#   podman-compose run --rm agent-fox <command> [args...]
#
# Examples:
#   podman-compose run --rm agent-fox run "fix the bug in cli/app.py"
#   podman-compose run --rm agent-fox --help

services:
  agent-fox:
    build:
      context: ../..
      dockerfile: scripts/self-dev/Containerfile
    volumes:
      # Mount the repo as the workspace (the code agent-fox will edit)
      - ../..:/workspace

      # Pass through git configuration
      - ~/.gitconfig:/root/.gitconfig:ro

      # SSH keys for git push/pull (optional)
      - ~/.ssh:/root/.ssh:ro

      # Claude Code config/auth (persistent across runs)
      - claude-config:/root/.claude
    environment:
      # API keys — set these in your shell or in a .env file
      - ANTHROPIC_API_KEY
      - CLAUDE_CODE_USE_BEDROCK
      - CLAUDE_CODE_USE_VERTEX
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_REGION
      - GOOGLE_APPLICATION_CREDENTIALS
      - GITHUB_PAT
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  claude-config:
