# agent-fox project configuration
# Uncomment and modify settings as needed.

# [hooks]
# pre_code = ["security-scan.sh"]
# post_code = ["license-check.sh"]
# sync_barrier = ["quality-check.sh"]  # Scripts to run at sync barriers
# timeout = 300  # seconds per hook

# [hooks.modes]
# "security-scan.sh" = "abort"   # "abort" (default) or "warn"
# "license-check.sh" = "warn"

# [security]
# Uncomment to replace the built-in allowlist entirely:
# bash_allowlist = ["ls", "cat", "git", "python", "uv"]

# Uncomment to extend the built-in allowlist:
# bash_allowlist_extend = ["cargo", "rustc", "docker"]

# [theme]
# playful = true                    # Enable kitsune personality (default: true)
# header = "bold #ff8c00"           # Banner and headers
# success = "bold green"            # Completed tasks
# error = "bold red"                # Failed/blocked tasks
# warning = "bold yellow"           # In-progress, caution
# info = "#daa520"                  # Informational text
# tool = "bold #cd853f"             # Tool names in progress
# muted = "dim"                     # Secondary text

# [memory]
# model = "SIMPLE"                 # Model for fact extraction (tier or model ID)

# [orchestrator]
# parallel = 1                      # Max concurrent sessions (1 = sequential, max 8)
# sync_interval = 5                 # Barrier every N sessions (0 = disabled, default: 5)
# hot_load = true                   # Enable spec hot-loading (default: true)

# [platform]
# type = "none"                     # "github" | "none" (future: "gitlab", "gitea")
# pr_granularity = "session"        # "session" (one PR per task group) | "spec" (one PR per spec)
# wait_for_ci = false               # Wait for CI checks before proceeding
# wait_for_review = false           # Wait for PR approval before proceeding
# auto_merge = false                # Auto-merge PR when gates pass
# ci_timeout = 600                  # Seconds to wait for CI (0 = no timeout)
# labels = []                       # Additional labels for every PR
